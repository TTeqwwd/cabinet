services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: development
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - ./backend/.env.development
    user: "1000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cabinet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    user: "node"
    networks:
      - cabinet_network

  postgres:
    image: postgres:16-alpine
    container_name: cabinet_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    env_file: ./backend/.env.development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    networks:
      - cabinet_network

  nginx:
    image: nginx:alpine
    container_name: cabinet_nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - cabinet_network

networks:
  cabinet_network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
