services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: development
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/var/www/html # Bind mount для постоянного внесения изменений
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file: ./backend/.env.development
    command: >
      sh -c "
        if [ ! -f .env ]; then
          cp .env.example .env
        fi &&
        php artisan key:generate &&
        php artisan migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "
    user: "1000"
    depends_on:
      postgres:
        condition: service_healthy
    tmpfs:
      - /tmp # кэш и временные файлы
    networks:
      - cabinet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app # исходники с хоста
      - frontend_node_modules:/app/node_modules # node_modules в отдельном volume
    environment:
      VITE_API_URL: http://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    user: "node"
    networks:
      - cabinet_network

  postgres:
    image: postgres:16-alpine
    container_name: cabinet_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: cabinet_user
      POSTGRES_DB: cabinet
      POSTGRES_PASSWORD: secret_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - cabinet_network

  nginx:
    image: nginx:alpine
    container_name: cabinet_nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - cabinet_network

networks:
  cabinet_network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
