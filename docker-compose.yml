services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: development
    container_name: cabinet_backend
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./backend/.env.development
    volumes:
      - ./backend:/var/www/html
    networks:
      - cabinet_network
    depends_on:
      - postgres
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: development
    container_name: cabinet_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - cabinet_network
    expose:
      - "5173"

  postgres:
    image: postgres:16-alpine
    container_name: cabinet_postgres
    restart: unless-stopped
    env_file: ./backend/.env.development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cabinet_network

  nginx:
    image: nginx:alpine
    container_name: cabinet_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cabinet_network
    depends_on:
      - backend

networks:
  cabinet_network:
    driver: bridge

volumes:
  postgres_data:
