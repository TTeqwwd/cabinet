services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: production
    env_file:
      - ./backend/.env
    command: php-fpm
    user: "10001"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - backend_storage:/app/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - cabinet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: build
    environment:
      VITE_API_URL: http://nginx
    read_only: true

  postgres:
    env_file: ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    read_only: true
    networks:
      - cabinet_network

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: production
    command: >
      sh -c "
      until pg_isready -h postgres -p 5432 -U postgres; do
        echo 'Waiting for postgres...';
        sleep 2;
      done;
      php artisan queue:work --verbose --tries=3 --timeout=90
      "
    user: "10001"
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    networks:
      - cabinet_network

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      target: production
    command: php artisan schedule:work
    user: "10001"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - backend_storage:/app/storage
    networks:
      - cabinet_network

networks:
  cabinet_network:
    driver: bridge

volumes:
  backend_storage:
