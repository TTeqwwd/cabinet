services:
  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
      target: production
    env_file:
      - ./backend/.env
    command: php-fpm
    user: "10001"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - backend_storage:/app/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - cabinet_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: build
    environment:
      VITE_API_URL: http://nginx
    read_only: true
    image: cabinet-frontend

  postgres:
    image: postgres:16-alpine
    env_file: ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cabinet_network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "8080:80"
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    depends_on:
      - frontend
    read_only: true
    networks:
      - cabinet_network

  worker:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
      target: production
    command: ["/app/docker/worker-entrypoint.sh"]
    user: "10001"
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    networks:
      - cabinet_network

  scheduler:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
      target: production
    command: ["/app/docker/scheduler-entrypoint.sh"]
    user: "10001"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - backend_storage:/app/storage
    networks:
      - cabinet_network

networks:
  cabinet_network:
    driver: bridge

volumes:
  backend_storage:
  postgres_data:
